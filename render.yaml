services:
  - type: web
    name: soli-microlink
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn backend.app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: soli-microlink-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: STRIPE_PUBLIC_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: ADMIN_EMAIL
        value: tesfaymn402@gmail.com
      - key: BASE_URL
        fromService:
          name: soli-microlink
          type: web
          property: url

databases:
  - name: soli-microlink-db
    databaseName: solimicrolink
    user: solimicrolink_user
