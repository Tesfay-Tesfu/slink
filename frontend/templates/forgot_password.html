{% extends "base.html" %}

{% block title %}Forgot Password - Afro-Merica{% endblock %}

{% block content %}
<div class="container" style="max-width: 450px; margin: 3rem auto;">
    <div class="card" style="border-radius: 60px; border: none; box-shadow: 0 20px 40px -20px rgba(0,40,104,0.2);">
        <div class="card-body p-5">
            <h2 class="text-center mb-4" style="color: #002868;">Reset Password</h2>
            
            <p class="text-center mb-4">Enter your email address and we'll send you a link to reset your password.</p>
            
            <form method="POST" action="{{ url_for('forgot_password') }}">
                <div class="mb-4">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" name="email" required style="border-radius: 60px; padding: 0.8rem;">
                </div>
                
                <button type="submit" class="btn btn-primary w-100" style="background: #002868; border: none; border-radius: 60px; padding: 1rem;">
                    <i class="fas fa-paper-plane"></i> Send Reset Link
                </button>
            </form>
            
            <hr class="my-4">
            
            <div class="text-center">
                <a href="{{ url_for('login') }}" style="color: #666;">
                    <i class="fas fa-arrow-left"></i> Back to Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
