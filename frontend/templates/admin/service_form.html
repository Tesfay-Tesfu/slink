{% extends "admin/base_admin.html" %}

{% block title %}{% if service %}Edit{% else %}Add{% endif %} Service - Admin{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h5 class="mb-0">{% if service %}Edit{% else %}Add New{% endif %} Service</h5>
    </div>
    <div class="card-body">
        <form method="POST" {% if service %}action="{{ url_for('admin_edit_service', service_id=service.id) }}"{% else %}action="{{ url_for('admin_add_service') }}"{% endif %}>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Service Name *</label>
                    <input type="text" class="form-control" name="name" value="{{ service.name if service else '' }}" required>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label">Category *</label>
                    <select class="form-control" name="category" required>
                        <option value="">Select Category</option>
                        <option value="math" {% if service and service.category == 'math' %}selected{% endif %}>Mathematics</option>
                        <option value="physics" {% if service and service.category == 'physics' %}selected{% endif %}>Physics</option>
                        <option value="data" {% if service and service.category == 'data' %}selected{% endif %}>Data Analytics</option>
                        <option value="research" {% if service and service.category == 'research' %}selected{% endif %}>Research Support</option>
                        <option value="webdev" {% if service and service.category == 'webdev' %}selected{% endif %}>Web Development</option>
                    </select>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label">Subcategory</label>
                    <input type="text" class="form-control" name="subcategory" value="{{ service.subcategory if service else '' }}" placeholder="e.g., python, calculus, landing">
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label">Price ($) *</label>
                    <input type="number" step="0.01" class="form-control" name="price" value="{{ service.price if service else '' }}" required>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label">Discounted Price ($)</label>
                    <input type="number" step="0.01" class="form-control" name="discounted_price" value="{{ service.discounted_price if service else '' }}">
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label">Duration (hours)</label>
                    <input type="number" step="0.5" class="form-control" name="duration_hours" value="{{ service.duration_hours if service else '1' }}" required>
                </div>
                
                <div class="col-12 mb-3">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" name="description" rows="3">{{ service.description if service else '' }}</textarea>
                </div>
                
                <div class="col-12 mb-3">
                    <label class="form-label">Features (one per line)</label>
                    <textarea class="form-control" name="features" rows="5">{% if service and service.features %}{% set features = service.features|from_json %}{% for feature in features %}{{ feature }}
{% endfor %}{% endif %}</textarea>
                </div>
                
                <div class="col-12 mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="is_popular" id="isPopular" {% if service and service.is_popular %}checked{% endif %}>
                        <label class="form-check-label" for="isPopular">
                            Mark as Popular
                        </label>
                    </div>
                    
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="is_active" id="isActive" {% if not service or service.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="isActive">
                            Active
                        </label>
                    </div>
                </div>
            </div>
            
            <hr>
            
            <div class="d-flex justify-content-between">
                <a href="{{ url_for('admin_services') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">
                    {% if service %}Update{% else %}Create{% endif %} Service
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
