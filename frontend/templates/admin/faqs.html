
{% extends "admin/base_admin.html" %}

{% block content %}
<div class="container-fluid">
    <h1 class="h3 mb-4">Manage FAQs</h1>
    
    <a href="{{ url_for('admin_add_faq') }}" class="btn btn-primary mb-3">
        <i class="fas fa-plus"></i> Add New FAQ
    </a>
    
    <div class="card">
        <div class="card-body">
            <table class="table">
                <thead>
                    <tr>
                        <th>Order</th>
                        <th>Question</th>
                        <th>Category</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for faq in faqs %}
                    <tr>
                        <td>{{ faq.order }}</td>
                        <td>{{ faq.question }}</td>
                        <td>{{ faq.category }}</td>
                        <td>
                            {% if faq.is_active %}
                            <span class="badge bg-success">Active</span>
                            {% else %}
                            <span class="badge bg-secondary">Inactive</span>
                            {% endif %}
                        </td>
                        <td>
                            <a href="{{ url_for('admin_edit_faq', faq_id=faq.id) }}" class="btn btn-sm btn-warning">
                                <i class="fas fa-edit"></i>
                            </a>
                            <form method="POST" action="{{ url_for('admin_delete_faq', faq_id=faq.id) }}" style="display:inline;">
                                <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete this FAQ?')">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
